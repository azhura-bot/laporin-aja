name: CI/CD Laravel to Vercel

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare app env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Run tests
        run: composer test

  deploy_preview:
    name: Deploy Preview (non-main)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@51.3.0

      - name: Check Vercel CLI version
        run: vercel --version

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy_production:
    name: Deploy Production (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@51.3.0

      - name: Check Vercel CLI version
        run: vercel --version

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Production deploy attempt $attempt/$max_attempts"

            set +e
            deploy_output="$(vercel deploy --prebuilt --prod --yes --logs --token=${{ secrets.VERCEL_TOKEN }} 2>&1)"
            deploy_exit=$?
            set -e

            echo "$deploy_output"

            deploy_url="$(echo "$deploy_output" | grep -Eo 'https://[^ ]+\\.vercel\\.app' | tail -n1 || true)"

            if [ "$deploy_exit" -eq 0 ]; then
              echo "Deploy command succeeded."
              exit 0
            fi

            if [ -n "$deploy_url" ]; then
              echo "Deploy command failed but URL detected: $deploy_url"
              echo "Checking final status via inspect..."

              set +e
              inspect_output="$(vercel inspect "$deploy_url" --wait --timeout=5m --token=${{ secrets.VERCEL_TOKEN }} 2>&1)"
              inspect_exit=$?
              set -e

              echo "$inspect_output"

              if [ "$inspect_exit" -eq 0 ]; then
                echo "Deployment is READY after inspect."
                exit 0
              fi
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 20))
              echo "Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi

            attempt=$((attempt + 1))
          done

          echo "Production deploy failed after $max_attempts attempts."
          exit 1
